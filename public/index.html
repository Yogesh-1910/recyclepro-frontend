<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecyclePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { 50:'#E1F5EE', 100:'#9FE1CB', 500:'#1D9E75', 600:'#0F6E56', 700:'#085041' },
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f4; }
      input:focus, select:focus, textarea:focus { outline: 2px solid #1D9E75; outline-offset: 1px; }
      .fade-in { animation: fadeIn 0.2s ease; }
      @keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
